<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: #0a0a0f;
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
  }
  .phone {
    width: 260px; height: 420px; background: #0a0a0f;
    border: 2px solid #1a1a2e; border-radius: 32px;
    overflow: hidden; position: relative; display: flex; flex-direction: column;
  }
  .notch {
    width: 120px; height: 24px; background: #0a0a0f;
    border-radius: 0 0 14px 14px; margin: 0 auto;
    border: 1px solid #1a1a2e; border-top: none;
  }
  .status-bar {
    display: flex; justify-content: space-between; padding: 4px 20px 0;
    font-size: 11px; color: #5b5b6e;
  }
  .app-content { flex: 1; padding: 12px 16px; overflow: hidden; }
  .app-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
  }
  .app-title {
    font-size: 20px; font-weight: 700; color: #e8e8ed;
    text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
    letter-spacing: -0.5px;
  }
  .glitch-badge {
    font-size: 9px; padding: 3px 8px; border-radius: 4px;
    background: rgba(255,0,255,0.15); color: #ff00ff;
    font-weight: 600; font-family: monospace; text-transform: uppercase;
  }
  .search-bar {
    width: 100%; height: 32px; background: #12121a; border: 1px solid #1a1a2e;
    border-radius: 8px; padding: 0 10px; font-size: 12px; color: #5b5b6e;
    display: flex; align-items: center; margin-bottom: 12px;
  }
  .tags { display: flex; gap: 6px; margin-bottom: 12px; overflow: hidden; }
  .tag {
    padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 500;
    white-space: nowrap; border: 1px solid #1a1a2e; color: #5b5b6e;
  }
  .tag.active { background: rgba(0,229,160,0.1); border-color: #00e5a0; color: #00e5a0; }
  .food-card {
    background: #12121a; border: 1px solid #1a1a2e; border-radius: 12px;
    overflow: hidden; margin-bottom: 10px;
  }
  .food-img {
    width: 100%; height: 80px; position: relative; overflow: hidden;
  }
  .food-img-bg {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #12121a 50%, #1a1a2e 100%);
  }
  .food-img-glitch {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,255,255,0.03) 2px, rgba(0,255,255,0.03) 4px
    );
  }
  .food-emoji {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 32px;
  }
  .food-info { padding: 10px; }
  .food-name { font-size: 13px; font-weight: 600; color: #e8e8ed; margin-bottom: 2px; }
  .food-meta { font-size: 10px; color: #5b5b6e; display: flex; gap: 8px; }
  .food-rating { color: #00e5a0; }
  .price { color: #ffbd2e; }
  .bottom-nav {
    height: 44px; border-top: 1px solid #1a1a2e; display: flex;
    align-items: center; justify-content: space-around; padding: 0 20px;
  }
  .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: #5b5b6e; }
  .nav-dot.active { background: #00e5a0; }
  .side-text {
    position: absolute; right: 340px; top: 50%; transform: translateY(-50%);
    text-align: right;
  }
  .side-title { font-size: 24px; font-weight: 700; color: #e8e8ed; margin-bottom: 8px; text-shadow: 1px 0 #ff00ff, -1px 0 #00ffff; }
  .side-desc { font-size: 13px; color: #5b5b6e; line-height: 1.6; max-width: 200px; margin-left: auto; }
</style>
</head>
<body>
  <div class="side-text">
    <div class="side-title">nerede yer?</div>
    <div class="side-desc">where do students eat?<br>discover, rate, share.</div>
  </div>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar"><span>9:41</span><span>5G ▂▅▇</span></div>
    <div class="app-content">
      <div class="app-header">
        <span class="app-title">nerede?</span>
        <span class="glitch-badge">Wroclaw</span>
      </div>
      <div class="search-bar">🔍 search cafes, restaurants...</div>
      <div class="tags">
        <span class="tag active">Near me</span>
        <span class="tag">Cheap eats</span>
        <span class="tag">Open now</span>
        <span class="tag">Vegan</span>
      </div>
      <div class="food-card">
        <div class="food-img">
          <div class="food-img-bg"></div>
          <div class="food-img-glitch"></div>
          <div class="food-emoji">🍜</div>
        </div>
        <div class="food-info">
          <div class="food-name">Pho Corner</div>
          <div class="food-meta"><span class="food-rating">★ 4.8</span><span>0.3 km</span><span class="price">$$</span></div>
        </div>
      </div>
      <div class="food-card">
        <div class="food-img">
          <div class="food-img-bg"></div>
          <div class="food-img-glitch"></div>
          <div class="food-emoji">🥙</div>
        </div>
        <div class="food-info">
          <div class="food-name">Kebab House</div>
          <div class="food-meta"><span class="food-rating">★ 4.5</span><span>0.5 km</span><span class="price">$</span></div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-dot active"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
    </div>
  </div>
</body>
</html>
