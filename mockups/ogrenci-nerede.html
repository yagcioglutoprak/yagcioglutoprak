<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    position: relative;
  }
  .glitch-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,0,255,0.08), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(0,255,255,0.06), transparent 50%);
  }
  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px, rgba(0,255,255,0.015) 3px, rgba(0,255,255,0.015) 6px
    );
    pointer-events: none;
  }
  .phone {
    width: 220px; height: 420px; background: #0a0a0f;
    border: 2px solid #1a1a2e; border-radius: 32px;
    overflow: hidden; display: flex; flex-direction: column;
    z-index: 1;
    box-shadow: 0 0 40px rgba(255,0,255,0.15);
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
  }
  .notch {
    width: 100px; height: 22px; background: #0a0a0f;
    border-radius: 0 0 12px 12px; margin: 0 auto;
    border: 1px solid #1a1a2e; border-top: none;
    flex-shrink: 0;
  }
  .status-bar {
    display: flex; justify-content: space-between; padding: 4px 16px 0;
    font-size: 10px; color: #5b5b6e;
    flex-shrink: 0;
  }
  .app-content { flex: 1; padding: 10px 14px; overflow: hidden; min-height: 0; }
  .app-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .app-title {
    font-size: 18px; font-weight: 700; color: #e8e8ed;
    text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff;
    letter-spacing: -0.5px;
  }
  .glitch-badge {
    font-size: 9px; padding: 3px 7px; border-radius: 4px;
    background: rgba(255,0,255,0.15); color: #ff00ff;
    font-weight: 600; font-family: monospace; text-transform: uppercase;
  }
  .search-bar {
    width: 100%; height: 28px; background: #12121a; border: 1px solid #1a1a2e;
    border-radius: 8px; padding: 0 10px; font-size: 11px; color: #5b5b6e;
    display: flex; align-items: center; margin-bottom: 10px;
  }
  .tags { display: flex; gap: 5px; margin-bottom: 10px; overflow: hidden; }
  .tag {
    padding: 3px 9px; border-radius: 12px; font-size: 9px; font-weight: 500;
    white-space: nowrap; border: 1px solid #1a1a2e; color: #5b5b6e;
  }
  .tag.active { background: rgba(0,229,160,0.1); border-color: #00e5a0; color: #00e5a0; }
  .food-card {
    background: #12121a; border: 1px solid #1a1a2e; border-radius: 10px;
    overflow: hidden; margin-bottom: 8px;
  }
  .food-img {
    width: 100%; height: 70px; position: relative; overflow: hidden;
  }
  .food-img-bg {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1a2e 0%, #12121a 50%, #1a1a2e 100%);
  }
  .food-img-glitch {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px, rgba(0,255,255,0.04) 2px, rgba(0,255,255,0.04) 4px
    );
  }
  .food-emoji {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 28px;
  }
  .food-info { padding: 8px 10px; }
  .food-name { font-size: 12px; font-weight: 600; color: #e8e8ed; margin-bottom: 2px; }
  .food-meta { font-size: 9px; color: #5b5b6e; display: flex; gap: 8px; }
  .food-rating { color: #00e5a0; }
  .price { color: #ffbd2e; }
  .bottom-nav {
    height: 36px; border-top: 1px solid #1a1a2e; display: flex;
    align-items: center; justify-content: space-around; padding: 0 20px;
    flex-shrink: 0;
  }
  .nav-dot { width: 5px; height: 5px; border-radius: 50%; background: #5b5b6e; }
  .nav-dot.active { background: #00e5a0; }
</style>
</head>
<body>
  <div class="glitch-bg"></div>
  <div class="scanlines"></div>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar"><span>9:41</span><span>5G ▂▅▇</span></div>
    <div class="app-content">
      <div class="app-header">
        <span class="app-title">nerede?</span>
        <span class="glitch-badge">Wroclaw</span>
      </div>
      <div class="search-bar">🔍 search cafes, restaurants...</div>
      <div class="tags">
        <span class="tag active">Near me</span>
        <span class="tag">Cheap eats</span>
        <span class="tag">Open now</span>
        <span class="tag">Vegan</span>
      </div>
      <div class="food-card">
        <div class="food-img">
          <div class="food-img-bg"></div>
          <div class="food-img-glitch"></div>
          <div class="food-emoji">🍜</div>
        </div>
        <div class="food-info">
          <div class="food-name">Pho Corner</div>
          <div class="food-meta"><span class="food-rating">★ 4.8</span><span>0.3 km</span><span class="price">$$</span></div>
        </div>
      </div>
      <div class="food-card">
        <div class="food-img">
          <div class="food-img-bg"></div>
          <div class="food-img-glitch"></div>
          <div class="food-emoji">🥙</div>
        </div>
        <div class="food-info">
          <div class="food-name">Kebab House</div>
          <div class="food-meta"><span class="food-rating">★ 4.5</span><span>0.5 km</span><span class="price">$</span></div>
        </div>
      </div>
    </div>
    <div class="bottom-nav">
      <div class="nav-dot active"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
      <div class="nav-dot"></div>
    </div>
  </div>
</body>
</html>
