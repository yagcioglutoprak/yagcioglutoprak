<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    position: relative;
  }
  .glow-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(196,77,255,0.08), transparent 60%),
      radial-gradient(ellipse at 70% 50%, rgba(255,107,157,0.06), transparent 60%);
  }
  .phone {
    width: 220px; height: 420px; background: #0a0a0f;
    border: 2px solid #1a1a2e; border-radius: 32px;
    overflow: hidden; display: flex; flex-direction: column;
    z-index: 1;
    box-shadow: 0 0 40px rgba(196,77,255,0.2);
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
  }
  .notch {
    width: 100px; height: 22px; background: #0a0a0f;
    border-radius: 0 0 12px 12px; margin: 0 auto;
    border: 1px solid #1a1a2e; border-top: none;
    flex-shrink: 0;
  }
  .status-bar {
    display: flex; justify-content: space-between; padding: 4px 16px 0;
    font-size: 10px; color: #5b5b6e;
    flex-shrink: 0;
  }
  .app-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .camera-view {
    flex: 1; position: relative; overflow: hidden; min-height: 0;
    background: linear-gradient(160deg, #1a1225 0%, #0f0f17 40%, #12121a 100%);
  }
  .hand {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    width: 160px; height: 180px;
  }
  .palm {
    position: absolute; bottom: 0; left: 25px; width: 110px; height: 90px;
    background: rgba(180,140,120,0.18); border-radius: 20px 20px 30px 30px;
  }
  .finger { position: absolute; background: rgba(180,140,120,0.18); border-radius: 10px 10px 4px 4px; }
  .f1 { width: 20px; height: 65px; bottom: 70px; left: 28px; transform: rotate(-8deg); }
  .f2 { width: 20px; height: 75px; bottom: 75px; left: 50px; transform: rotate(-2deg); }
  .f3 { width: 20px; height: 72px; bottom: 73px; left: 72px; transform: rotate(2deg); }
  .f4 { width: 18px; height: 60px; bottom: 68px; left: 94px; transform: rotate(6deg); }
  .thumb { width: 22px; height: 46px; bottom: 44px; left: 8px; transform: rotate(-30deg); border-radius: 12px; }
  .nail {
    position: absolute; border-radius: 6px 6px 2px 2px;
    background: linear-gradient(135deg, #ff6b9d, #c44dff);
    box-shadow: 0 0 10px rgba(196,77,255,0.6);
  }
  .n1 { width: 13px; height: 15px; bottom: 122px; left: 31px; transform: rotate(-8deg); }
  .n2 { width: 13px; height: 17px; bottom: 138px; left: 53px; transform: rotate(-2deg); }
  .n3 { width: 13px; height: 16px; bottom: 132px; left: 75px; transform: rotate(2deg); }
  .n4 { width: 11px; height: 14px; bottom: 116px; left: 96px; transform: rotate(6deg); }
  .n-thumb { width: 14px; height: 13px; bottom: 82px; left: 10px; transform: rotate(-30deg); }
  .ar-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 9px; padding: 3px 7px; border-radius: 4px;
    background: rgba(0,229,160,0.15); color: #00e5a0; font-weight: 600;
  }
  .ar-corners {
    position: absolute; top: 50px; left: 18px; right: 18px; bottom: 50px;
    border: 1px solid rgba(0,229,160,0.15); border-radius: 8px;
  }
  .design-panel {
    height: 84px; background: #0f0f17; border-top: 1px solid #1a1a2e;
    padding: 10px 14px; position: relative;
    flex-shrink: 0;
  }
  .panel-title { font-size: 9px; color: #5b5b6e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .designs { display: flex; gap: 7px; }
  .design-circle {
    width: 30px; height: 30px; border-radius: 50%; border: 2px solid #1a1a2e;
  }
  .design-circle.active { border-color: #00e5a0; }
  .dc1 { background: linear-gradient(135deg, #ff6b9d, #c44dff); }
  .dc2 { background: linear-gradient(135deg, #ff0000, #ff6b00); }
  .dc3 { background: linear-gradient(135deg, #00e5a0, #00a8ff); }
  .dc4 { background: linear-gradient(135deg, #f1fa8c, #ffbd2e); }
  .dc5 { background: linear-gradient(135deg, #e8e8ed, #5b5b6e); }
  .capture-btn {
    position: absolute; bottom: 10px; right: 14px;
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid #00e5a0; background: transparent;
    display: flex; align-items: center; justify-content: center;
  }
  .capture-inner { width: 22px; height: 22px; border-radius: 50%; background: #00e5a0; }
</style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="phone">
    <div class="notch"></div>
    <div class="status-bar"><span>9:41</span><span>5G ▂▅▇</span></div>
    <div class="app-content">
      <div class="camera-view">
        <div class="ar-badge">● AR Active</div>
        <div class="ar-corners"></div>
        <div class="hand">
          <div class="finger f1"></div>
          <div class="finger f2"></div>
          <div class="finger f3"></div>
          <div class="finger f4"></div>
          <div class="finger thumb"></div>
          <div class="palm"></div>
          <div class="nail n1"></div>
          <div class="nail n2"></div>
          <div class="nail n3"></div>
          <div class="nail n4"></div>
          <div class="nail n-thumb"></div>
        </div>
      </div>
      <div class="design-panel">
        <div class="panel-title">Choose design</div>
        <div class="designs">
          <div class="design-circle dc1 active"></div>
          <div class="design-circle dc2"></div>
          <div class="design-circle dc3"></div>
          <div class="design-circle dc4"></div>
          <div class="design-circle dc5"></div>
        </div>
        <div class="capture-btn"><div class="capture-inner"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
