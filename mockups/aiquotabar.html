<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 800px; height: 450px; overflow: hidden;
    background: #0a0a0f; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  }
  .menubar {
    width: 100%; height: 28px; background: #1a1a2e;
    display: flex; align-items: center; justify-content: flex-end;
    padding: 0 16px; gap: 18px; font-size: 13px; color: #e8e8ed;
  }
  .menubar-item { opacity: 0.7; }
  .menubar-icon { opacity: 1; color: #00e5a0; font-weight: 600; font-size: 12px; font-family: 'SF Mono', monospace; }
  .dropdown {
    width: 320px; margin-top: 8px; margin-right: 120px; align-self: flex-end;
    background: #12121a; border: 1px solid #1a1a2e; border-radius: 12px;
    padding: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .dropdown-title {
    font-size: 13px; font-weight: 600; color: #e8e8ed; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .dropdown-title .icon { color: #00e5a0; }
  .quota-item { margin-bottom: 14px; }
  .quota-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .quota-name { font-size: 13px; color: #e8e8ed; font-weight: 500; }
  .quota-value { font-size: 12px; color: #5b5b6e; font-family: 'SF Mono', monospace; }
  .quota-bar {
    width: 100%; height: 6px; background: #1a1a2e; border-radius: 3px; overflow: hidden;
  }
  .quota-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .fill-green { background: #00e5a0; }
  .fill-yellow { background: #ffbd2e; }
  .fill-red { background: #ff5f57; }
  .divider { border: none; border-top: 1px solid #1a1a2e; margin: 12px 0; }
  .reset-text { font-size: 11px; color: #5b5b6e; text-align: center; }
  .model-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 4px;
    background: rgba(0,229,160,0.1); color: #00e5a0; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="menubar">
    <span class="menubar-item">Wed 14 Apr</span>
    <span class="menubar-item">🔋</span>
    <span class="menubar-item">WiFi</span>
    <span class="menubar-icon">◧ 67%</span>
    <span class="menubar-item">3:42 PM</span>
  </div>
  <div class="dropdown">
    <div class="dropdown-title"><span class="icon">◧</span> AIQuotaBar</div>
    <div class="quota-item">
      <div class="quota-header">
        <span class="quota-name">Claude Opus 4 <span class="model-badge">Pro</span></span>
        <span class="quota-value">34 / 50 msgs</span>
      </div>
      <div class="quota-bar"><div class="quota-fill fill-yellow" style="width: 68%"></div></div>
    </div>
    <div class="quota-item">
      <div class="quota-header">
        <span class="quota-name">Claude Sonnet 4</span>
        <span class="quota-value">12 / 80 msgs</span>
      </div>
      <div class="quota-bar"><div class="quota-fill fill-green" style="width: 15%"></div></div>
    </div>
    <div class="quota-item">
      <div class="quota-header">
        <span class="quota-name">ChatGPT-4o</span>
        <span class="quota-value">41 / 50 msgs</span>
      </div>
      <div class="quota-bar"><div class="quota-fill fill-red" style="width: 82%"></div></div>
    </div>
    <div class="quota-item">
      <div class="quota-header">
        <span class="quota-name">GPT o3</span>
        <span class="quota-value">7 / 25 msgs</span>
      </div>
      <div class="quota-bar"><div class="quota-fill fill-green" style="width: 28%"></div></div>
    </div>
    <hr class="divider">
    <div class="reset-text">Resets in 2h 18m · Last synced 4s ago</div>
  </div>
</body>
</html>
